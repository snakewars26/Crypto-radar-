<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Crypto Radar</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 50px;
    }

    h1 {
      font-size: 2.5rem;
    }

    .card {
      margin-top: 40px;
      padding: 30px;
      border-radius: 15px;
      width: 300px;
      margin-left: auto;
      margin-right: auto;
      transition: 0.3s;
    }

    .green {
      background: #16a34a;
    }

    .red {
      background: #dc2626;
    }

    .yellow {
      background: #ca8a04;
    }

    .status {
      font-size: 2rem;
      font-weight: bold;
    }

    .reason {
      margin-top: 10px;
      font-size: 1rem;
    }

    .action {
      margin-top: 20px;
      font-size: 0.9rem;
      opacity: 0.9;
    }

    button {
      margin-top: 30px;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
    }
  </style>
</head>
<body>

  <h1> Crypto Radar</h1>

  <div id="radarCard" class="card yellow">
    <div id="status" class="status"> Neutre</div>
    <div id="reason" class="reason">Marché stable</div>
    <div id="action" class="action"> Attendre un signal clair</div>
  </div>

  <button onclick="simulate()">Simuler Signal</button>

  <script>
    function simulate() {
      const random = Math.random();

      const card = document.getElementById("radarCard");
      const status = document.getElementById("status");
      const reason = document.getElementById("reason");
      const action = document.getElementById("action");

      if (random < 0.33) {
        card.className = "card green";
        status.innerText = " Opportunité";
        reason.innerText = "Accumulation détectée + volume en hausse";
        action.innerText = " Entrer progressivement";
      } 
      else if (random < 0.66) {
        card.className = "card red";
        status.innerText = " Danger";
        reason.innerText = "Ventes importantes détectées";
        action.innerText = " Éviter d'acheter / réduire position";
      } 
      else {
        card.className = "card yellow";
        status.innerText = " Neutre";
        reason.innerText = "Pas de signal fort";
        action.innerText = " Attendre";
      }
    }
  </script>

</body>
</html>
